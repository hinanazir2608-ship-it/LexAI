<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LexAI — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#0d1b3e; --gold:#c9a84c; --gold-light:#e8c97a;
    --text:#e8edf5; --text-dim:#a8b4c8; --border:rgba(201,168,76,0.2);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--navy); color:var(--text);
    font-family:'DM Sans',sans-serif; min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    background-image:radial-gradient(ellipse 80% 60% at 20% 10%, rgba(201,168,76,0.06) 0%, transparent 60%);
  }
  .card {
    width:100%; max-width:420px;
    background:rgba(255,255,255,0.03);
    border:1px solid var(--border);
    border-radius:12px; padding:3rem;
    box-shadow:0 24px 64px rgba(0,0,0,0.4);
  }
  .logo {
    font-family:'Cormorant Garamond',serif;
    font-size:1.8rem; font-weight:700;
    color:var(--gold); text-align:center; margin-bottom:0.5rem;
  }
  .logo span { color:var(--text); font-weight:400; }
  .subtitle { text-align:center; color:var(--text-dim); font-size:0.88rem; margin-bottom:2rem; }
  .form-group { margin-bottom:1.2rem; }
  label { display:block; font-size:0.82rem; color:var(--text-dim); margin-bottom:0.4rem; letter-spacing:0.05em; text-transform:uppercase; }
  input {
    width:100%; padding:0.75rem 1rem;
    background:rgba(255,255,255,0.05);
    border:1px solid var(--border); border-radius:6px;
    color:var(--text); font-family:'DM Sans',sans-serif;
    font-size:0.95rem; transition:all 0.2s; outline:none;
  }
  input:focus { border-color:var(--gold); background:rgba(201,168,76,0.05); }
  .remember { display:flex; align-items:center; gap:0.5rem; font-size:0.88rem; color:var(--text-dim); margin-top:0.5rem; }
  .remember input { width:auto; }
  .btn {
    width:100%; padding:0.9rem; background:var(--gold);
    color:#0d1b3e; border:none; border-radius:6px;
    font-family:'DM Sans',sans-serif; font-size:1rem;
    font-weight:600; cursor:pointer; margin-top:1rem; transition:all 0.2s;
  }
  .btn:hover { background:var(--gold-light); transform:translateY(-1px); }
  .link { text-align:center; margin-top:1.5rem; font-size:0.88rem; color:var(--text-dim); }
  .link a { color:var(--gold); text-decoration:none; }
  .flash { padding:0.75rem 1rem; border-radius:6px; font-size:0.88rem; margin-bottom:1rem; }
  .flash.error { background:rgba(255,107,107,0.1); border:1px solid rgba(255,107,107,0.3); color:#ff9999; }
  .flash.success { background:rgba(107,255,184,0.1); border:1px solid rgba(107,255,184,0.3); color:#99ffcc; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Lex<span>AI</span></div>
  <div class="subtitle">Welcome back, Counselor</div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="/login">
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" placeholder="jane@lawfirm.com" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Your password" required>
    </div>
    <div class="remember">
      <input type="checkbox" name="remember" id="remember">
      <label for="remember" style="text-transform:none;">Remember me</label>
    </div>
    <button type="submit" class="btn">Log In →</button>
  </form>

  <div class="link">
    No account yet? <a href="/register">Create one</a>
  </div>
</div>
</body>
</html>
